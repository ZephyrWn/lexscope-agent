name: Dependabot

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  dependabot:
    name: Dependabot
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify Dependabot configuration
        run: test -f .github/dependabot.yml
