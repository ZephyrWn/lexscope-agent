name: Nightly Regression

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:

jobs:
  regression:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Generate large dataset
        run: python3 scripts/generate_eval_dataset.py

      - name: Generate baseline predictions
        run: python3 scripts/generate_eval_predictions.py --dataset evaluation/dataset.large.json --output evaluation/predictions.generated.json

      - name: Run regression gate
        run: python3 scripts/run_regression.py --dataset evaluation/dataset.large.json --predictions evaluation/predictions.generated.json --threshold 0.75

  owasp-full-scan:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: "17"
          distribution: temurin
          cache: maven

      - name: Cache OWASP NVD Database
        uses: actions/cache@v6
        with:
          path: ~/.m2/repository/org/owasp/dependency-check-data
          key: owasp-nvd-${{ github.run_id }}
          restore-keys: |
            owasp-nvd-

      - name: Full OWASP Dependency Check
        run: |
          mvn org.owasp:dependency-check-maven:check \
            -DnvdApiKey=${{ secrets.NVD_API_KEY }} \
            -DnvdApiDelay=6000 \
            -DnvdValidForHours=24
        continue-on-error: true

      - name: Upload OWASP Report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: owasp-nightly-report
          path: target/dependency-check-report.*
