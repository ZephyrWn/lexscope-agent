version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
    commit-message:
      prefix: "deps(maven):"
    ignore:
      - dependency-name: "com.puppycrawl.tools:checkstyle"
        versions: [">=11"]

  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    commit-message:
      prefix: "deps(npm):"
    ignore:
      - dependency-name: "vite"
        versions: [">=6"]
      - dependency-name: "eslint"
        versions: [">=9"]
      - dependency-name: "@vitejs/plugin-vue"
        versions: [">=6"]
      - dependency-name: "eslint-plugin-vue"
        versions: [">=10"]
      - dependency-name: "vue-eslint-parser"
        versions: [">=10"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "ci"
    commit-message:
      prefix: "ci(deps):"

  - package-ecosystem: "docker"
    directory: "/"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 3
    labels:
      - "docker"
    commit-message:
      prefix: "deps(docker):"
    ignore:
      - dependency-name: "eclipse-temurin"
        versions: [">=18"]
